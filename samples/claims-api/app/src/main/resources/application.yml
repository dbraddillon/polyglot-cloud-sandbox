server:
  port: 8083

spring:
  jpa:
    hibernate:
      # Auto-creates/updates tables from the entity classes - convenient for a sandbox, but real
      # Java shops use Flyway or Liquibase migrations instead (the EF Core Migrations
      # equivalent) so schema changes are reviewable and repeatable, not inferred at boot time.
      ddl-auto: update
    # Spring Boot defaults this to true (the "Open Session In View" pattern - keeps a Hibernate
    # session open through view rendering). Most experienced Java devs turn it off for REST
    # APIs: it can mask N+1 query bugs and holds a DB connection open longer than it needs to.
    open-in-view: false
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/claims}
    username: ${SPRING_DATASOURCE_USERNAME:claims}
    password: ${SPRING_DATASOURCE_PASSWORD:claims}
